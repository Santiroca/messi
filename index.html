  </svg>
</button>
      <div class="search-expand" id="searchExpand" style="display:none">

      </div>
    </div>
  </div>

    <div class="mtab on" data-tab="col" onclick="switchTab(this)">Mi Colección</div>
    <div class="mtab" data-tab="missing" onclick="switchTab(this)">Las que faltan</div>
    <div class="mtab" data-tab="cat" onclick="switchTab(this)">Catálogo</div>
  </div>
</div>

<div class="scroll" id="scroll"><div id="inner"></div></div>

<div class="nav">
  <div class="nav-i on" id="ni-col" onclick="navTo('col')"><span class="ico">👕</span>Colección</div>

<div class="overlay" id="addOv" onclick="bgc(event,'addOv')">

    <div class="fw">

      </div>
    </div>
    <button class="save-btn" onclick="saveCustom()">Guardar</button>
  </div>
</div>

const CAT_LABELS={"orig":"Original sin número","orig-num":"Original con número","china":"China AAA","trucha":"Trucha s/núm"}; // kept for legacy
const CAT_CLS={"orig":"bc-orig","orig-num":"bc-orig-num","china":"bc-china","trucha":"bc-trucha"};
// Club order: club first, then selección
const CLUB_ORDER=["Barcelona","PSG","Inter Miami","Argentina"];
// Type order within each club inside a season
const TYPE_ORDER={"home":0,"away":1,"third":2,"fourth":3};
function stars(n){return Array.from({length:5},(_,i)=>i<n?"⭐":"☆").join("");}

// Sort by season string, then within same season: club order + type order
function sortItems(arr,asc){
  return [...arr].sort((a,b)=>{
    const sA=a.season||a._s||String(a.year);
    const sB=b.season||b._s||String(b.year);
    const sCmp=asc?sA.localeCompare(sB):sB.localeCompare(sA);
    if(sCmp!==0) return sCmp;
    // same season: club order
    const cA=CLUB_ORDER.indexOf(a.club), cB=CLUB_ORDER.indexOf(b.club);
    const clubDiff=(cA===-1?99:cA)-(cB===-1?99:cB);
    if(clubDiff!==0) return clubDiff;
    // same club: type order
    const tA=TYPE_ORDER[a.type]??9, tB=TYPE_ORDER[b.type]??9;
    return tA-tB;
  });
}

function groupBy(arr){
  const m={};
  arr.forEach(x=>{const s=x.season||String(x.year);if(!m[s])m[s]=[];m[s].push(x);});
  return m;
}
function sKeys(m,asc){return Object.keys(m).sort((a,b)=>asc?a.localeCompare(b):b.localeCompare(a));}

}

function switchTab(el){
  document.querySelectorAll(".mtab").forEach(t=>t.classList.remove("on"));
  el.classList.add("on");mainTab=el.dataset.tab;
  document.getElementById("scroll").scrollTop=0;
  const inner=document.getElementById("inner");
  inner.style.animation='none';void inner.offsetWidth;inner.style.animation='';
  render();
  // Update nav AFTER render
  document.querySelectorAll(".nav-i").forEach(e=>e.classList.remove("on"));
  document.getElementById("ni-col")?.classList.add("on");
  const bar=document.getElementById('scrollBar');
  if(['col','missing','cat'].includes(mainTab)){
    setTimeout(initScrollBar,100);
    if(bar)bar.style.display='block';
  } else {
    if(bar){bar.style.display='none';bar.classList.remove('visible');}
  }
}
function navTo(t){
  mainTab=t;
  document.querySelectorAll(".mtab").forEach(e=>e.classList.toggle("on",e.dataset.tab===t));
  document.querySelectorAll(".nav-i").forEach(e=>e.classList.remove("on"));
  document.getElementById("ni-"+t)?.classList.add("on");

  }
}

function enrich(j){

  return{...j,_s:c?c.season:(j.season||String(j.year)),_n:c?c.num:(j.num||10),
    club:c?c.club:j.club, type:c?c.type:(j.type||"home"), year:c?c.year:j.year};
}
function initCardInteractions(){

function render(){

function toggleSearch(){
  const exp=document.getElementById("searchExpand");
  const btn=document.getElementById("searchToggle");
  const open=exp.style.display==="none";
  exp.style.display=open?"flex":"none";
  btn.classList.toggle("active",open);
  if(open){document.getElementById("searchInput").focus();}
  else{
    const hadQuery=searchQuery!=="";
    searchQuery="";
    document.getElementById("searchInput").value="";
    if(hadQuery)render();
  }
}
function onSearch(v){
  searchQuery=v.trim().toLowerCase();
  render();
}
function clearSearch(){
  const hadQuery=searchQuery!=="";
  searchQuery="";
  document.getElementById("searchInput").value="";
  document.getElementById("searchExpand").style.display="none";
  document.getElementById("searchToggle").classList.remove("active");
  if(hadQuery)render();
}
function applySearch(items){
  if(!searchQuery)return items;
  return items.filter(j=>{
    const name=(j.name||j.home||"").toLowerCase();
    const club=(j.club||j.away||"").toLowerCase();
    const year=String(j.year||j.date||"");
    const comp=(j.competition||"").toLowerCase();
    const stadium=(j.stadium||"").toLowerCase();
    return name.includes(searchQuery)||club.includes(searchQuery)||year.includes(searchQuery)||comp.includes(searchQuery)||stadium.includes(searchQuery);
  });
}

function openDrawer(caller){
  drawerCaller=caller;
  pClub=fClub;pType=fType;

  document.getElementById("dClubs").innerHTML=[["all","Todos"],["Barcelona","Barcelona"],["PSG","PSG"],["Inter Miami","Inter Miami"],["Argentina","Argentina"]].map(([v,l])=>
    `<button class="dopt${pClub===v?" on":""}" data-val="${v}" onclick="setPClub('${v}')">
      <span style="display:flex;align-items:center;gap:8px">
        ${LOGOS[v]?`<img src="${LOGOS[v]}" style="width:24px;height:24px;object-fit:contain;border-radius:6px;mix-blend-mode:lighten">`:" "}
        ${l}
      </span>
      <span class="dopt-count">${clubCounts[v]}</span>
    </button>`).join("");
  const typeCounts={"all":CATALOG.length,"home":CATALOG.filter(c=>c.type==="home").length,"away":CATALOG.filter(c=>c.type==="away").length,"third":CATALOG.filter(c=>c.type==="third"||c.type==="fourth").length};
  document.getElementById("dTypes").innerHTML=[["all","Todas"],["home","Titular"],["away","Suplente"],["third","Tercera"]].map(([v,l])=>
    `<button class="dopt${pType===v?" on":""}" data-val="${v}" onclick="setPType('${v}')"><span>${l}</span><span class="dopt-count">${typeCounts[v]}</span></button>`).join("");
  document.getElementById("drawerWrap").classList.add("open");
  // Swipe to close drawer
  const drawer=document.querySelector(".drawer");
  let startY=0,isDragging=false;
  function ds(y,e){if(e&&e.target.closest("button,input,select"))return;startY=y;isDragging=true;drawer.style.transition="none";}
  function dm(y){if(!isDragging)return;const d=y-startY;if(d>0)drawer.style.transform=`translateY(${d}px)`;}
  function de(y){if(!isDragging)return;isDragging=false;drawer.style.transition="transform .32s cubic-bezier(.32,.72,0,1)";if(y-startY>80){closeDrawer();drawer.style.transform="";}else drawer.style.transform="";}
  drawer.addEventListener("touchstart",e=>ds(e.touches[0].clientY,e),{passive:true});
  drawer.addEventListener("touchmove",e=>dm(e.touches[0].clientY),{passive:true});
  drawer.addEventListener("touchend",e=>de(e.changedTouches[0].clientY),{passive:true});
  drawer.addEventListener("mousedown",e=>ds(e.clientY,e));
  window.addEventListener("mousemove",e=>{if(isDragging)dm(e.clientY);});
  window.addEventListener("mouseup",e=>{if(isDragging)de(e.clientY);});
}

  const totalMessiAssists=allMatches.reduce((s,m)=>s+(m.messiAssists||0),0);
  const stadiums=[...new Set(allMatches.map(m=>m.stadium.split(",")[0].trim()))];
  const competitions=[...new Set(allMatches.map(m=>m.competition))];

      <div class="stat-box"><div class="stat-val">${totalMessiAssists}</div><div class="stat-lbl">🎯 Asistencias vistas</div></div>

  inner.innerHTML=`<div class="progress-wrap">

      <div class="prog-donut-wrap">

        <div class="prog-donut-label">
          <div class="prog-donut-pct" id="progPct">0%</div>
          <div class="prog-donut-sub">TOTAL</div>
        </div>
      </div>
      <div class="prog-total-text">
        <div class="prog-total-num"><span id="progOwned">0</span><span style="font-size:14px;color:var(--sub)">/${totalCat}</span></div>

        el.textContent=Math.round(e*target)+(suffix||'');
        if(p<1)requestAnimationFrame(step);
      }
      requestAnimationFrame(step);

  });

function addFromCat(cid){
  const c=CATALOG.find(x=>x.id===cid);if(!c)return;
  col.unshift({id:Date.now().toString(),catalogId:cid,name:c.name,club:c.club,year:c.year,img:c.img,num:c.num||10,type:c.type,season:c.season,cat:document.getElementById("cc").value,cond:parseInt(document.getElementById("cd").value),fav:false});
  save();
  lastAddedCid=cid;
  document.getElementById("detOv").classList.remove("open");
  // Stay in catalog at same position
  const scrollEl=document.getElementById("scroll");
  const savedScroll=scrollEl.scrollTop;
  mainTab="cat";
  document.querySelectorAll(".mtab").forEach(t=>t.classList.toggle("on",t.dataset.tab==="cat"));
  render();
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    scrollEl.scrollTop=savedScroll;
    // Animate the check on the newly added card
    if(lastAddedCid){
      // Find the card - owned cards use col entry id, so find by catalog id in data
      const cards=document.querySelectorAll('.cat-card');
      cards.forEach(c=>{
        const check=c.querySelector('.owned-check');
        if(check){
          // This is an owned card - check if it matches our last added
          const colEntry=col.find(j=>j.catalogId===lastAddedCid);
          if(colEntry&&c.dataset.id===colEntry.id){
            check.classList.add('pop');
            setTimeout(()=>check.classList.remove('pop'),600);
          }
        }
      });
      lastAddedCid=null;
    }
  }));
}

// ── SWIPE TO CLOSE - only from handle ──
function addSwipeToClose(sheetEl, overlayId){
  let startY=0, currentY=0, isDragging=false;
  function onStart(y,e){
    // activate from anywhere in top 280px of sheet
    const sheetTop=sheetEl.getBoundingClientRect().top;
    if(y-sheetTop>280)return;
    if(e.target.closest('button,input,select,a'))return;
    startY=y;isDragging=true;sheetEl.style.transition='none';
  }
  function onMove(y,e){
    if(!isDragging)return;
    currentY=y;
    const diff=currentY-startY;
    if(diff>0){
      if(e&&e.cancelable)e.preventDefault();
      sheetEl.style.transform=`translateY(${diff}px)`;
    }
  }
  function onEnd(){
    if(!isDragging)return;
    isDragging=false;
    sheetEl.style.transition='transform .32s cubic-bezier(.32,.72,0,1)';
    const diff=currentY-startY;
    if(diff>60){document.getElementById(overlayId).classList.remove('open');sheetEl.style.transform='';}
    else sheetEl.style.transform='';
    startY=0;currentY=0;
  }
  sheetEl.addEventListener('touchstart',e=>onStart(e.touches[0].clientY,e),{passive:true});
  sheetEl.addEventListener('touchmove',e=>onMove(e.touches[0].clientY,e),{passive:false});
  sheetEl.addEventListener('touchend',onEnd,{passive:true});
  sheetEl.addEventListener('mousedown',e=>onStart(e.clientY,e));
  window.addEventListener('mousemove',e=>{if(isDragging)onMove(e.clientY,e);});
  window.addEventListener('mouseup',()=>{if(isDragging)onEnd();});
}


// ── LONG PRESS MENU ──
let lpTimer=null, lpActive=false;

// ── LONG PRESS MENU ──
function initLongPress(el, id, type){
  function start(e){
    lpActive=false;
    clearTimeout(lpTimer);
    const touch=e.touches?e.touches[0]:e;
    const x=touch.clientX, y=touch.clientY;
    lpTimer=setTimeout(()=>{
      lpActive=true;
      showCtxMenu(x, y, id, type);
    },600);
  }
  function cancel(){ clearTimeout(lpTimer); }
  // Touch
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel,{passive:true});
  el.addEventListener('touchmove',cancel,{passive:true});
  // Mouse - NO mouseleave so moving slightly doesn't cancel
  el.addEventListener('mousedown',e=>{ if(e.button!==0)return; start(e); });
  el.addEventListener('mouseup',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('click',()=>{ setTimeout(()=>{lpActive=false;},50); });
}
function showCtxMenu(x, y, id, type){
  closeCtxMenu();
  const backdrop=document.createElement('div');
  backdrop.className='ctx-backdrop';
  backdrop.onclick=closeCtxMenu;

  const sheet=document.createElement('div');
  sheet.className='ctx-sheet';
  sheet.id='ctxMenu';

  let items='';
  if(type==='col'||type==='owned'){
    items=`<div class="ctx-item danger" onclick="ctxDel('${id}')">🗑️ Eliminar de mi colección</div>`;
  } else {
    items=`<div class="ctx-item" onclick="ctxAdd('${id}')">➕ Agregar a mi colección</div>`;
  }

  sheet.innerHTML=`
    <div class="ctx-handle"></div>
    ${items}
    <button class="ctx-cancel" onclick="closeCtxMenu()">Cancelar</button>`;

  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  // Add swipe to close
  let startY=0, isDragging=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;isDragging=true;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const diff=e.touches[0].clientY-startY;
    if(diff>0)sheet.style.transform=`translateY(${diff}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    isDragging=false;
    sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
    const diff=e.changedTouches[0].clientY-startY;
    if(diff>60){closeCtxMenu();}
    else sheet.style.transform='';
  },{passive:true});
  sheet.addEventListener('mousedown',e=>{startY=e.clientY;isDragging=true;sheet.style.transition='none';});
  window.addEventListener('mousemove',e=>{if(isDragging){const d=e.clientY-startY;if(d>0)sheet.style.transform=`translateY(${d}px)`;}});
  window.addEventListener('mouseup',e=>{if(isDragging){isDragging=false;sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';if(e.clientY-startY>60)closeCtxMenu();else sheet.style.transform='';}});
}

function exportData(){
  const data={col,matches:JSON.parse(localStorage.getItem("messi_matches")||"[]")};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='messi-coleccion.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.col){col=data.col;save();}
      if(data.matches)localStorage.setItem("messi_matches",JSON.stringify(data.matches));
      document.getElementById("scroll").scrollTop=0;
      render();
      alert("✅ Colección restaurada correctamente");
    }catch(err){
      alert("❌ Archivo inválido");
    }
  };
  reader.readAsText(file);
  e.target.value='';
}


// ── DRAGGABLE SCROLLBAR ──
function initScrollBar(){
  const scroll=document.getElementById('scroll');
  let bar=document.getElementById('scrollBar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='scrollBar';
    bar.className='scroll-bar';
    document.body.appendChild(bar);
  }
  let hideTimer, isDragging=false, startY=0, startScrollTop=0;

  function updateBar(){
    const {scrollTop,scrollHeight,clientHeight}=scroll;
    if(scrollHeight<=clientHeight+10){bar.classList.remove('visible');return;}
    const rect=scroll.getBoundingClientRect();
    const nav=document.querySelector('.nav');
    const navH=nav?nav.getBoundingClientRect().height:0;
    const trackH=rect.height-8-navH;
    const barH=Math.max(44,trackH*(clientHeight/scrollHeight));
    const maxTop=rect.top+trackH-barH+4;
    const barTop=Math.min(rect.top+4+scrollTop/scrollHeight*trackH, maxTop);
    bar.style.height=barH+'px';
    bar.style.top=barTop+'px';
    bar.classList.add('visible');
    clearTimeout(hideTimer);
    if(!isDragging)hideTimer=setTimeout(()=>bar.classList.remove('visible'),1500);
  }

  scroll.addEventListener('scroll',updateBar,{passive:true});

  function onDragStart(clientY){
    isDragging=true;
    startY=clientY;
    startScrollTop=scroll.scrollTop;
    bar.classList.add('visible');
    bar.style.transition='none';
  }
  function onDragMove(clientY){
    if(!isDragging)return;
    const {scrollHeight,clientHeight}=scroll;
    const rect=scroll.getBoundingClientRect();
    const ratio=(scrollHeight-clientHeight)/(rect.height-parseInt(bar.style.height||'44'));
    scroll.scrollTop=startScrollTop+(clientY-startY)*ratio;
    updateBar();
  }
  function onDragEnd(){
    isDragging=false;
    bar.style.transition='opacity .3s,width .2s,right .2s';
    hideTimer=setTimeout(()=>bar.classList.remove('visible'),1500);
  }

  bar.addEventListener('touchstart',e=>{onDragStart(e.touches[0].clientY);e.preventDefault();},{passive:false});
  bar.addEventListener('touchmove',e=>{onDragMove(e.touches[0].clientY);e.preventDefault();},{passive:false});
  bar.addEventListener('touchend',onDragEnd,{passive:true});
  bar.addEventListener('mousedown',e=>{onDragStart(e.clientY);e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(isDragging)onDragMove(e.clientY);});
  window.addEventListener('mouseup',()=>{if(isDragging)onDragEnd();});

  updateBar();
}

function bgc(e,id){if(e.target.id===id)document.getElementById(id).classList.remove("open")}
render();
if(['col','missing','cat'].includes(mainTab))initScrollBar();
// Splash screen
setTimeout(()=>{
  const s=document.getElementById('splash');
  if(s){s.style.opacity='0';s.style.transition='opacity .4s ease';setTimeout(()=>s.remove(),400);}
},1500);
</script>
