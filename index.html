<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07090f">
<title>Colección Messi</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="images/icon-192.png">
<link rel="shortcut icon" href="images/icon-192.png">
<link rel="apple-touch-icon" href="images/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--s1:#0e1220;--s2:#151c30;--s3:#1c2440;--gold:#d4a017;--gold2:#f2c94c;--blue:#1a56db;--text:#e8eaf5;--sub:#6a7490;--r:14px;--safe:env(safe-area-inset-bottom,16px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{color:var(--text);font-family:"Barlow Condensed",sans-serif;display:flex;flex-direction:column}
.hdr{flex-shrink:0;background:rgba(7,9,15,.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,.35);padding:10px 14px 0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-img{width:44px;height:38px;object-fit:contain;flex-shrink:0}
.search-inline{display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-toggle{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;opacity:.7;transition:opacity .2s;flex-shrink:0;filter:brightness(0) saturate(100%) invert(78%) sepia(60%) saturate(400%) hue-rotate(5deg)}
.search-toggle.active{opacity:1}
.search-expand{display:flex;align-items:center;gap:5px}
.search-input-inline{background:var(--s2);border:1.5px solid rgba(255,255,255,.12);border-radius:18px;padding:7px 12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:13px;outline:none;width:130px;transition:border-color .2s,width .25s;-webkit-appearance:none}
.search-input-inline:focus{border-color:var(--blue)}
.search-input-inline::placeholder{color:var(--sub)}
.search-clear{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
/* PROGRESS */
.progress-wrap{margin:10px 10px 0;background:var(--s1);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.06)}
.progress-title{font-family:"Bebas Neue",sans-serif;font-size:17px;letter-spacing:1.5px;color:var(--gold2);margin-bottom:12px}
.prog-row{margin-bottom:10px}
.prog-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.prog-club{font-size:12px;font-weight:700;color:var(--text)}
.prog-count{font-size:11px;font-weight:700;color:var(--sub)}
.prog-bar-bg{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .6s ease}
.prog-total-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.prog-donut-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.prog-donut-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prog-donut-pct{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold2);line-height:1}
.prog-donut-sub{font-size:8px;color:var(--sub);font-weight:700;letter-spacing:.3px}
.prog-total-text{flex:1}
.prog-total-num{font-family:"Bebas Neue",sans-serif;font-size:26px;color:var(--gold2);line-height:1}
.prog-total-lbl{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px}
.logo-text{font-family:"Bebas Neue",sans-serif;font-size:23px;letter-spacing:3px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logo-sub{font-size:10px;letter-spacing:.7px;-webkit-text-fill-color:var(--sub);margin-top:1px}
.chips-row{display:flex;gap:5px;padding:6px 0 0;overflow-x:auto;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 11px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.on{background:rgba(212,160,23,.18);border-color:var(--gold);color:var(--gold2);box-shadow:0 0 10px rgba(212,160,23,.2)}
.main-tabs{display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,.04);margin-top:6px}
.mtab{flex:1;padding:9px 4px;font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-align:center;white-space:nowrap;letter-spacing:.2px}
.mtab.on{color:var(--gold2);border-bottom-color:var(--gold)}
.scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 10px 6px}
.filter-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.filter-btn.active{border-color:var(--gold);color:var(--gold2);background:rgba(212,160,23,.1)}
.sort-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px 14px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:50px;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.season-hdr{font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:2px;color:var(--gold2);padding:18px 12px 10px 12px;display:flex;align-items:center;gap:8px;margin-top:6px;border-top:1px solid rgba(212,160,23,.15)}.season-hdr::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(212,160,23,.3),transparent)}
.season-hdr small{font-size:10px;font-weight:600;font-family:"Barlow Condensed",sans-serif;color:var(--sub)}
.grid-wrap{padding:0 10px;margin-bottom:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding-bottom:4px}
.pb-safe{height:calc(72px + var(--safe));flex-shrink:0}
.empty{text-align:center;padding:50px 20px;color:var(--sub);font-size:14px;line-height:1.8}
.card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .18s;animation:up .3s ease both;position:relative}
.card:active{transform:scale(.95)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-img{position:relative;background:var(--s2);height:160px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img img{max-width:100%;max-height:160px;width:auto;height:auto;object-fit:contain;display:block}
.badge-cat{position:absolute;top:6px;left:6px;font-size:8px;font-weight:800;letter-spacing:.3px;padding:3px 8px;border-radius:6px;line-height:1.4}
.bc-orig{background:#1a56db;color:#fff;border:1px solid #4a7ff5}
.bc-orig-num{background:#b87a00;color:#fff;border:1px solid #f0a020}
.bc-china{background:#b01a1a;color:#fff;border:1px solid #e04040}
.bc-trucha{background:#3a3a50;color:#ddd;border:1px solid #5a5a70}
.fav-star{position:absolute;top:4px;right:5px;font-size:21px;cursor:pointer;transition:transform .2s;z-index:5;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
.fav-star:active{transform:scale(1.3)}
.card-info{padding:6px 9px 2px}
.card-club{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
.card-name{font-size:12px;font-weight:700;line-height:1.2;margin:1px 0}
.card-year{font-size:10px;color:var(--sub)}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:2px 9px 7px}
.card-num{font-family:"Bebas Neue",sans-serif;font-size:26px;color:rgba(255,255,255,.07);line-height:1}
.stars{font-size:10px}
.cat-card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;transition:transform .15s}
.cat-card:active{transform:scale(.96)}
.owned-chip{position:absolute;inset:0;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);border-radius:12px;z-index:2;pointer-events:none}.owned-check{position:absolute;top:7px;right:7px;width:22px;height:22px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:3;color:#fff;font-weight:900;box-shadow:0 2px 6px rgba(34,197,94,.4)}
.cat-img{height:110px;background:var(--s2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.cat-img img{max-width:100%;max-height:110px;width:auto;height:auto;object-fit:contain}
.cat-info{padding:5px 8px 4px}
.cat-yr{font-size:9px;font-weight:700;color:var(--sub)}
.cat-name{font-size:11px;font-weight:700;line-height:1.2}
.add-cat-btn{width:100%;padding:7px;background:linear-gradient(135deg,#2563eb,#1d4ed8,#1e40af);border:none;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.3px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.cat-chips-row{display:flex;gap:5px;padding:0 10px 6px;overflow-x:auto;scrollbar-width:none}
.cat-chips-row::-webkit-scrollbar{display:none}
.cchip{flex-shrink:0;padding:5px 11px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.cchip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cchip.type-chip.on{background:var(--s3);border-color:rgba(255,255,255,.2);color:var(--text)}
.drawer-wrap{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-wrap.open{opacity:1;pointer-events:all}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px)}
.drawer{position:relative;background:linear-gradient(180deg,#131828 0%,#0e1220 100%);border-radius:22px 22px 0 0;padding-bottom:calc(16px + var(--safe));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);border-top:1px solid rgba(212,160,23,.2)}
.drawer-wrap.open .drawer{transform:translateY(0)}
.d-handle{width:36px;height:4px;background:rgba(212,160,23,.25);border-radius:2px;margin:14px auto 16px}
.d-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;padding:0 18px;margin-bottom:14px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.d-sec{padding:0 18px;margin-bottom:14px}
.d-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.7px;margin-bottom:7px}
.d-opts{display:flex;flex-wrap:wrap;gap:7px}
.dopt{padding:8px 16px;border-radius:20px;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.dopt.on{background:var(--blue);border-color:var(--blue);color:#fff}
.d-apply{width:calc(100% - 36px);margin:4px 18px 0;padding:14px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:13px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.nav{flex-shrink:0;background:rgba(7,9,15,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(212,160,23,.25);display:flex;justify-content:space-around;padding:7px 0 calc(7px + var(--safe))}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--sub);cursor:pointer;padding:3px 14px;transition:color .2s}
.nav-i .ico{font-size:19px}
.nav-i.on{color:var(--gold2)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--s1);border-radius:22px 22px 0 0;max-height:93dvh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet::-webkit-scrollbar{display:none}
.handle{width:36px;height:4px;background:rgba(212,160,23,.25);border-radius:2px;margin:13px auto 15px}
.sh2{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:2px;padding:0 15px;margin-bottom:12px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fw{padding:0 15px}
.field{margin-bottom:10px}
.field label{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;display:block;margin-bottom:4px}
.field select,.field input{width:100%;background:var(--s2);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;outline:none;-webkit-appearance:none}
.row2{display:flex;gap:7px}.row2 .field{flex:1}
.save-btn{width:calc(100% - 30px);margin:10px 15px calc(10px + var(--safe));padding:14px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:12px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.det-hero{margin:0 13px 12px;border-radius:14px;background:var(--s2);height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.det-hero img{max-width:100%;max-height:220px;width:auto;height:auto;object-fit:contain}
.det-meta{padding:0 14px}
.det-club{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--gold);margin-bottom:1px}
.det-name{font-family:"Bebas Neue",sans-serif;font-size:23px;line-height:1.1;margin-bottom:4px}
.det-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px}
.tag{font-size:9px;font-weight:800;letter-spacing:.3px;padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.08);color:var(--sub)}
.tag.g{background:rgba(212,160,23,.2);color:var(--gold2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 14px 11px}
.stat-box{background:var(--s2);border-radius:10px;padding:9px 11px;border:1px solid rgba(255,255,255,.06);border-left:2px solid rgba(212,160,23,.5)}
.stat-val{font-family:"Bebas Neue",sans-serif;font-size:26px;color:var(--gold2);line-height:1}
.stat-lbl{font-size:9px;font-weight:800;color:var(--sub);letter-spacing:.4px;margin-top:1px}
.titles-sec{margin:0 14px 13px}
.titles-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;margin-bottom:5px}
.titles-list{display:flex;flex-wrap:wrap;gap:5px}
.title-chip{background:linear-gradient(135deg,rgba(212,160,23,.2),rgba(242,201,76,.1));border:1px solid rgba(212,160,23,.25);color:var(--gold2);font-size:10px;font-weight:700;padding:4px 10px;border-radius:18px}
.no-titles{font-size:12px;color:var(--sub);font-style:italic}
.det-acts{display:flex;gap:8px;padding:0 14px;margin-bottom:calc(14px + var(--safe))}
.btn-del{flex:1;padding:12px;border:1.5px solid rgba(220,53,69,.3);border-radius:12px;background:rgba(220,53,69,.08);color:#ff7070;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-cls{flex:1;padding:12px;background:var(--s2);border:none;border-radius:12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-add{flex:2;padding:12px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:12px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.in-sel{width:100%;background:var(--s2);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;outline:none;-webkit-appearance:none;margin-bottom:7px}
.in-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;display:block;margin-bottom:4px}

/* MATCHES */
.matches-wrap{padding:10px}
.match-add-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:13px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.match-card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:14px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:transform .15s;border-top:1px solid rgba(212,160,23,.12)}
.match-card:active{transform:scale(.98)}
.match-header{padding:10px 12px 8px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.match-teams{flex:1}
.match-comp{font-size:9px;font-weight:800;letter-spacing:.8px;color:var(--gold);text-transform:uppercase;margin-bottom:3px}
.match-vs{font-family:"Bebas Neue",sans-serif;font-size:18px;letter-spacing:1px;line-height:1.1}
.match-info{font-size:10px;color:var(--sub);margin-top:2px}
.match-score-box{background:var(--s2);border-radius:10px;padding:6px 10px;text-align:center;flex-shrink:0}
.match-score{font-family:"Bebas Neue",sans-serif;font-size:22px;color:var(--gold2);line-height:1}
.match-date{font-size:9px;color:var(--sub);font-weight:700;margin-top:1px;white-space:nowrap}
.match-footer{background:var(--s2);padding:8px 12px;display:flex;align-items:center;gap:10px}
.match-messi-stat{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--text)}
.match-messi-ico{font-size:13px}
.match-play-btn{margin-left:auto;background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.25);color:#ff4444;border-radius:8px;padding:5px 10px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
/* match detail */
.yt-embed{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;margin:0 0 12px}
.match-note{font-size:13px;color:var(--sub);line-height:1.6;padding:0 14px;margin-bottom:12px;font-style:italic}
.scorers-list{padding:0 14px;margin-bottom:12px}
.scorers-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;margin-bottom:5px}
.scorer-chip{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;margin:3px 3px 0 0}
.match-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 14px 12px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="logo-row">
      <img id="logoImg" class="logo-img" alt="Messi">
      <div><div class="logo-text">Messi Collection</div><div class="logo-sub">Mi colección personal</div></div>
    </div>
    <div class="search-inline" id="searchInline">
      <button class="search-toggle" id="searchToggle" onclick="toggleSearch()">🔍</button>
      <div class="search-expand" id="searchExpand" style="display:none">
        <input class="search-input-inline" id="searchInput" type="search" placeholder="Buscar..." oninput="onSearch(this.value)" autofocus>
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
    </div>
  </div>
  <div class="main-tabs">
    <div class="mtab on" data-tab="col" onclick="switchTab(this)">Mi Colección</div>
    <div class="mtab" data-tab="missing" onclick="switchTab(this)">Las que faltan</div>
    <div class="mtab" data-tab="cat" onclick="switchTab(this)">Catálogo</div>
  </div>
</div>

<div class="scroll" id="scroll"><div id="inner"></div></div>

const TOTAL=CATALOG.length;
const CAT_LABELS={"orig":"Original s/núm","orig-num":"Original c/núm","china":"China AAA","trucha":"Trucha s/núm"};
const CAT_CLS={"orig":"bc-orig","orig-num":"bc-orig-num","china":"bc-china","trucha":"bc-trucha"};
// Club order: club first, then selección
const CLUB_ORDER=["Barcelona","PSG","Inter Miami","Argentina"];
// Type order within each club inside a season
const TYPE_ORDER={"home":0,"away":1,"third":2,"fourth":3};
function stars(n){return Array.from({length:5},(_,i)=>i<n?"⭐":"☆").join("");}

// Sort by season string, then within same season: club order + type order
function sortItems(arr,asc){
  return [...arr].sort((a,b)=>{
    const sA=a.season||a._s||String(a.year);
    const sB=b.season||b._s||String(b.year);
    const sCmp=asc?sA.localeCompare(sB):sB.localeCompare(sA);
    if(sCmp!==0) return sCmp;
    // same season: club order
    const cA=CLUB_ORDER.indexOf(a.club), cB=CLUB_ORDER.indexOf(b.club);
    const clubDiff=(cA===-1?99:cA)-(cB===-1?99:cB);
    if(clubDiff!==0) return clubDiff;
    // same club: type order
    const tA=TYPE_ORDER[a.type]??9, tB=TYPE_ORDER[b.type]??9;
    return tA-tB;
  });
}

function groupBy(arr){
  const m={};
  arr.forEach(x=>{const s=x.season||String(x.year);if(!m[s])m[s]=[];m[s].push(x);});
  return m;
}
function sKeys(m,asc){return Object.keys(m).sort((a,b)=>asc?a.localeCompare(b):b.localeCompare(a));}

    return`<div class="chip${catFilter===k?" on":""}" onclick="setCF('${k}')">${l} ${cnt}</div>`;
  }).join("")}</div>`;
}

  document.querySelectorAll(".nav-i").forEach(e=>e.classList.remove("on"));
  document.getElementById("ni-"+t)?.classList.add("on");
  render();
}
function toggleFav(id,e){e.stopPropagation();const j=col.find(x=>x.id===id);if(j){j.fav=!j.fav;save();render();}}
function toggleSort(isCat){if(isCat)catSort=!catSort;else sortAsc=!sortAsc;render();}
function enrich(j){
  const c=j.catalogId?CATALOG.find(x=>x.id===j.catalogId):null;
  return{...j,_s:c?c.season:(j.season||String(j.year)),_n:c?c.num:(j.num||10),
    club:c?c.club:j.club, type:c?c.type:(j.type||"home"), year:c?c.year:j.year};
}
function render(){
  renderChips();
  const inner=document.getElementById("inner");
  if(mainTab==="col")renderCol(inner);
  else if(mainTab==="missing")renderMissing(inner);

function toggleSearch(){
  const exp=document.getElementById("searchExpand");
  const btn=document.getElementById("searchToggle");
  const open=exp.style.display==="none";
  exp.style.display=open?"flex":"none";
  btn.classList.toggle("active",open);
  if(open)document.getElementById("searchInput").focus();
  else{searchQuery="";document.getElementById("searchInput").value="";render();}
}
function onSearch(v){
  searchQuery=v.trim().toLowerCase();
  render();
}
function clearSearch(){
  searchQuery="";
  document.getElementById("searchInput").value="";
  document.getElementById("searchExpand").style.display="none";
  document.getElementById("searchToggle").classList.remove("active");
  render();
}
function applySearch(items){
  if(!searchQuery)return items;
  return items.filter(j=>{
    const name=(j.name||j.home||"").toLowerCase();
    const club=(j.club||j.away||"").toLowerCase();
    const year=String(j.year||j.date||"");
    const comp=(j.competition||"").toLowerCase();
    const stadium=(j.stadium||"").toLowerCase();
    return name.includes(searchQuery)||club.includes(searchQuery)||year.includes(searchQuery)||comp.includes(searchQuery)||stadium.includes(searchQuery);
  });
}

function collCard(j,i){

// Build season HTML from enriched items (already sorted)
function makeSeasonHTML(items,asc){
  const g=groupBy(items.map(x=>({...x,season:x._s||x.season||String(x.year)})));
  return sKeys(g,asc).map(s=>{
    // items within season already sorted by club+type from sortItems()
    const its=g[s];
    const clubs=[...new Set(its.map(x=>x.club))].join(" · ");
    return`<div class="season-hdr">Temporada ${s} <small>${clubs}</small></div>
      <div class="grid-wrap"><div class="grid">${its.map((j,idx)=>collCard(j,idx)).join("")}</div></div>`;
  }).join("");
}

function makeCatSeasonHTML(items,asc,owned){
  const g=groupBy(items.map(x=>({...x,season:x.season||String(x.year)})));
  return sKeys(g,asc).map(s=>{
    const its=g[s];
    const clubs=[...new Set(its.map(x=>x.club))].join(" · ");
    return`<div class="season-hdr">Temporada ${s} <small>${clubs}</small></div>
      <div class="grid-wrap"><div class="grid">${its.map(c=>catCard(c,owned.has(c.id))).join("")}</div></div>`;
  }).join("");
}

    <button class="filter-btn${fo?" active":""}" onclick="openDrawer('cat')">⚙️ Filtrar${fo?" •":""}</button>

function closeDrawer(){document.getElementById("drawerWrap").classList.remove("open");}
function setPClub(v){pClub=v;document.querySelectorAll("#dClubs .dopt").forEach(b=>b.classList.toggle("on",b.textContent===(v==="all"?"Todos":v)));}
function setPType(v){pType=v;const m={"all":"Todas","home":"Titular","away":"Suplente","third":"Tercera"};document.querySelectorAll("#dTypes .dopt").forEach(b=>b.classList.toggle("on",b.textContent===m[v]));}
function applyDrawer(){fClub=pClub;fType=pType;closeDrawer();render();}

function renderProgress(inner){
  const owned=new Set(col.map(j=>j.catalogId).filter(Boolean));
  const clubs=["Barcelona","PSG","Inter Miami","Argentina"];
  const clubColors={"Barcelona":"#c8102e","PSG":"#002f5e","Inter Miami":"#f0a8c0","Argentina":"#74b3e8"};
  const clubTotal={"Barcelona":0,"PSG":0,"Inter Miami":0,"Argentina":0};
  const clubOwned={"Barcelona":0,"PSG":0,"Inter Miami":0,"Argentina":0};
  CATALOG.forEach(c=>{
    if(clubTotal[c.club]!==undefined){
      clubTotal[c.club]++;
      if(owned.has(c.id))clubOwned[c.club]++;
    }
  });
  const totalCat=CATALOG.length;
  const totalOwned=col.length;
  const pct=Math.round(totalOwned/totalCat*100);
  // SVG donut
  const r=28,circ=2*Math.PI*r;
  const filled=circ*(pct/100);
  const donutSVG=`<svg width="70" height="70" viewBox="0 0 70 70">
    <circle cx="35" cy="35" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="8"/>
    <circle cx="35" cy="35" r="${r}" fill="none" stroke="#f2c94c" stroke-width="8"
      stroke-dasharray="${filled} ${circ}" stroke-dashoffset="${circ/4}"
      stroke-linecap="round" transform="rotate(-90 35 35)"/>
  </svg>`;

  const barsHTML=clubs.map(club=>{
    const tot=clubTotal[club]||0;
    const own=clubOwned[club]||0;
    const p=tot?Math.round(own/tot*100):0;
    const col_=clubColors[club]||"var(--blue)";
    return`<div class="prog-row">
      <div class="prog-row-top">
        <span class="prog-club">${club}</span>
        <span class="prog-count">${own}/${tot} · ${p}%</span>
      </div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${p}%;background:${col_}"></div></div>
    </div>`;
  }).join("");

  // Cat breakdown
  const catBreak=["orig","orig-num","china","trucha"].map(k=>{
    const cnt=col.filter(j=>j.cat===k).length;
    const lbl=CAT_LABELS[k];
    const p=totalOwned?Math.round(cnt/totalOwned*100):0;
    const clr={"orig":"#1a56db","orig-num":"#b87a00","china":"#b01a1a","trucha":"#3a3a50"}[k];
    return`<div class="prog-row">
      <div class="prog-row-top"><span class="prog-club">${lbl}</span><span class="prog-count">${cnt} · ${p}%</span></div>
      <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${p}%;background:${clr}"></div></div>
    </div>`;
  }).join("");

  // Match stats
  const userMatches=JSON.parse(localStorage.getItem("messi_matches")||"[]");
  const allMatches=[...MY_MATCHES,...userMatches];
  const totalMatches=allMatches.length;
  const totalMessiGoals=allMatches.reduce((s,m)=>s+(m.messiGoals||0),0);
  const totalMessiAssists=allMatches.reduce((s,m)=>s+(m.messiAssists||0),0);
  const stadiums=[...new Set(allMatches.map(m=>m.stadium.split(",")[0].trim()))];
  const competitions=[...new Set(allMatches.map(m=>m.competition))];
  const wins=allMatches.filter(m=>{
    const [h,a]=m.score.split("-").map(Number);
    const argOrBarca=["Argentina","Barcelona","FC Barcelona"].includes(m.home);
    return argOrBarca?h>a:a>h;
  }).length;

  const matchStatsHTML=`<div class="progress-wrap" style="margin-bottom:10px">
    <div class="progress-title">🏟️ Partidos en Vivo</div>
    <div class="stats-grid" style="margin:0 0 12px">
      <div class="stat-box"><div class="stat-val">${totalMatches}</div><div class="stat-lbl">Partidos vistos</div></div>
      <div class="stat-box"><div class="stat-val">${wins}</div><div class="stat-lbl">Victorias 🏆</div></div>
      <div class="stat-box"><div class="stat-val">${totalMessiGoals}</div><div class="stat-lbl">⚽ Goles de Messi vistos</div></div>
      <div class="stat-box"><div class="stat-val">${totalMessiAssists}</div><div class="stat-lbl">🎯 Asistencias vistas</div></div>
    </div>
    <div class="prog-row" style="margin-bottom:10px">
      <div class="prog-row-top"><span class="prog-club">Estadios visitados</span><span class="prog-count">${stadiums.length}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">${stadiums.map(s=>`<span style="background:var(--s3);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--text)">📍 ${s}</span>`).join("")}</div>
    </div>
    <div class="prog-row">
      <div class="prog-row-top"><span class="prog-club">Competencias</span><span class="prog-count">${competitions.length}</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:5px">${competitions.map(c=>`<span style="background:var(--s3);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--gold2)">🏆 ${c}</span>`).join("")}</div>
    </div>
  </div>`;

  inner.innerHTML=`<div class="progress-wrap">
    <div class="progress-title">📊 Progreso Total</div>
    ${barsHTML}
    <div class="prog-total-row">
      <div class="prog-donut-wrap">
        ${donutSVG}
        <div class="prog-donut-label">
          <div class="prog-donut-pct">${pct}%</div>
          <div class="prog-donut-sub">TOTAL</div>
        </div>
      </div>
      <div class="prog-total-text">
        <div class="prog-total-num">${totalOwned}<span style="font-size:14px;color:var(--sub)">/${totalCat}</span></div>
        <div class="prog-total-lbl">camisetas en tu colección</div>
      </div>
    </div>
  </div>
  <div class="progress-wrap" style="margin-top:10px">
    <div class="progress-title">👕 Por Categoría</div>
    ${catBreak}
  </div>
  ${matchStatsHTML}
  <div class="pb-safe"></div>`;
}

  const titlesHTML=c.titles&&c.titles.length?c.titles.map(t=>`<span class="title-chip">🏆 ${t}</span>`).join(""):`<span class="no-titles">Sin títulos esta temporada</span>`;

      <div class="det-tags">
        <span class="tag">#${c.num||10}</span>
        <span class="tag">${c.type==="home"?"Titular":c.type==="away"?"Suplente":"Tercera"}</span>

    </div>`;
  document.getElementById("detOv").classList.add("open");
}
function addFromCat(cid){
  const c=CATALOG.find(x=>x.id===cid);if(!c)return;
  col.unshift({id:Date.now().toString(),catalogId:cid,name:c.name,club:c.club,year:c.year,img:c.img,num:c.num||10,type:c.type,season:c.season,cat:document.getElementById("cc").value,cond:parseInt(document.getElementById("cd").value),fav:false});
  save();
  // Close sheet, stay in catalog, restore scroll
  const scrollEl=document.getElementById("scroll");
  const savedScroll=scrollEl.scrollTop;
  document.getElementById("detOv").classList.remove("open");
  // Stay on catalog tab
  mainTab="cat";
  document.querySelectorAll(".mtab").forEach(t=>t.classList.toggle("on",t.dataset.tab==="cat"));
  render();
  // Restore scroll position after DOM update
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ scrollEl.scrollTop=savedScroll; }));
}
function openDetail(id){
  const j=col.find(x=>x.id===id);if(!j)return;
  const c=j.catalogId?CATALOG.find(x=>x.id===j.catalogId):null;
  const imgSrc=(j.img!=null&&j.img>=0)?IMGS[j.img]:"";
  const catLbl=CAT_LABELS[j.cat]||"Original",catCls=CAT_CLS[j.cat]||"bc-orig";
  const num=c?c.num:(j.num||10);
  const titlesHTML=c&&c.titles&&c.titles.length?c.titles.map(t=>`<span class="title-chip">🏆 ${t}</span>`).join(""):`<span class="no-titles">Sin títulos esta temporada</span>`;
  document.getElementById("detSheet").innerHTML=`
    <div class="handle"></div>
    <div class="det-hero">${imgSrc?`<img src="${imgSrc}" alt="">`:`<span style="font-size:65px;display:flex;align-items:center;justify-content:center;height:220px">👕</span>`}</div>
    <div class="det-meta">
      <div class="det-club">${j.club} · ${j.year}</div>
      <div class="det-name">${j.name}</div>
      <div class="det-tags">
        <span class="tag ${catCls}" style="color:#fff">${catLbl}</span>
        <span class="tag">#${num}</span>
        <span style="font-size:15px;letter-spacing:1px">${stars(j.cond||3)}</span>
      </div>
    </div>
    ${c?`<div class="stats-grid">
      <div class="stat-box"><div class="stat-val">${c.goals||0}</div><div class="stat-lbl">⚽ Goles temporada</div></div>
      <div class="stat-box"><div class="stat-val">${c.assists||0}</div><div class="stat-lbl">🎯 Asistencias</div></div>
    </div>
    <div class="titles-sec">
      <div class="titles-lbl">🏆 TÍTULOS ESTA TEMPORADA</div>
      <div class="titles-list">${titlesHTML}</div>
    </div>`:""}
    <div class="det-acts">
      <button class="btn-del" onclick="delJ('${j.id}')">Eliminar</button>
      <button class="btn-cls" onclick="document.getElementById('detOv').classList.remove('open')">Cerrar</button>
    </div>`;
  document.getElementById("detOv").classList.add("open");
}
function delJ(id){if(!confirm("¿Eliminar?"))return;col=col.filter(j=>j.id!==id);save();document.getElementById("detOv").classList.remove("open");render();}
function openAdd(){document.getElementById("addOv").classList.add("open");}
function saveCustom(){
  const name=document.getElementById("fn").value.trim();if(!name){alert("Poné un nombre");return;}
  col.unshift({id:Date.now().toString(),name,club:document.getElementById("fc").value,year:parseInt(document.getElementById("fy").value)||new Date().getFullYear(),cat:document.getElementById("fcat").value,type:document.getElementById("ftype").value,cond:parseInt(document.getElementById("fcond").value),img:-1,num:10,fav:false});
  save();document.getElementById("addOv").classList.remove("open");
  mainTab="col";document.querySelectorAll(".mtab").forEach(t=>t.classList.toggle("on",t.dataset.tab==="col"));render();
}

function renderMatches(inner){
  // combine preset matches + user added matches from localStorage
  const userMatches=JSON.parse(localStorage.getItem("messi_matches")||"[]");
  let all=[...MY_MATCHES,...userMatches].sort((a,b)=>new Date(b.date)-new Date(a.date));
  all=applySearch(all);
  inner.innerHTML=`<div class="matches-wrap">
    <button class="match-add-btn" onclick="openAddMatch()">+ Agregar partido</button>
    ${all.map(m=>`
      <div class="match-card" onclick="openMatchDetail('${m.id}')">
        <div class="match-header">
          <div class="match-teams">
            <div class="match-comp">${m.competition} · ${m.round}</div>
            <div class="match-vs">${teamFlag(m.home)} ${m.home} vs ${teamFlag(m.away)} ${m.away}</div>
            <div class="match-info">📍 ${m.stadium}</div>
          </div>
          <div class="match-score-box">
            <div class="match-score">${m.score}</div>
            <div class="match-date">${m.date}</div>
          </div>
        </div>
        <div class="match-footer">
          ${m.messiGoals>0?`<div class="match-messi-stat"><span class="match-messi-ico">⚽</span>${m.messiGoals} gol${m.messiGoals>1?"es":""}</div>`:""}
          ${m.messiAssists>0?`<div class="match-messi-stat"><span class="match-messi-ico">🎯</span>${m.messiAssists} asist.</div>`:""}
          ${m.messiGoals===0&&m.messiAssists===0?`<div class="match-messi-stat" style="color:var(--sub)">Messi jugó</div>`:""}
          ${m.youtubeId?`<button class="match-play-btn" onclick="event.stopPropagation();openMatchDetail('${m.id}')">▶ Ver resumen</button>`:""}
        </div>
      </div>`).join("")}
    <div class="pb-safe"></div>
  </div>`;
}

function openMatchDetail(id){
  const userMatches=JSON.parse(localStorage.getItem("messi_matches")||"[]");
  const m=[...MY_MATCHES,...userMatches].find(x=>x.id===id);
  if(!m)return;
  const scorersHTML=m.scorers&&m.scorers.length
    ?m.scorers.map(s=>`<span class="scorer-chip">⚽ ${s}</span>`).join("")
    :"";
  document.getElementById("detSheet").innerHTML=`
    <div class="handle"></div>
    ${m.youtubeId?`<div style="padding:0 20px;margin-bottom:4px">
      <div style="position:relative;width:100%;max-width:320px;margin:0 auto;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.5);cursor:pointer" onclick="openYT('${m.youtubeId}')">
        <img src="https://img.youtube.com/vi/${m.youtubeId}/hqdefault.jpg" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3)">
          <div style="width:54px;height:54px;background:rgba(255,0,0,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.5)">
            <div style="width:0;height:0;border-top:11px solid transparent;border-bottom:11px solid transparent;border-left:18px solid #fff;margin-left:4px"></div>
          </div>
        </div>
        <div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:.3px">▶ Ver en YouTube</div>
      </div>
    </div>`:""}
    <div class="det-meta">
      <div class="det-club">${m.competition} · ${m.round}</div>
      <div class="det-name">${teamFlag(m.home)} ${m.home} ${m.score} ${teamFlag(m.away)} ${m.away}</div>
      <div class="det-tags">
        <span class="tag">📅 ${m.date}</span>
        <span class="tag">📍 ${m.stadium}</span>
      </div>
    </div>
    <div class="stats-grid" style="margin:0 14px 11px">
      <div class="stat-box"><div class="stat-val">${m.messiGoals||0}</div><div class="stat-lbl">⚽ Goles Messi</div></div>
      <div class="stat-box"><div class="stat-val">${m.messiAssists||0}</div><div class="stat-lbl">🎯 Asistencias</div></div>
    </div>
    ${scorersHTML?`<div class="scorers-list"><div class="scorers-lbl">GOLEADORES</div><div>${scorersHTML}</div></div>`:""}
    ${m.note?`<div class="match-note">"${m.note}"</div>`:""}
    <div class="det-acts">
      ${!m.id.startsWith("m")&&!["m1","m2","m3","m4","m5"].includes(m.id)?`<button class="btn-del" onclick="deleteMatch('${m.id}')">Eliminar</button>`:`<div></div>`}
      <button class="btn-cls" onclick="document.getElementById('detOv').classList.remove('open')">Cerrar</button>
    </div>`;
  document.getElementById("detOv").classList.add("open");
}

function deleteMatch(id){
  if(!confirm("¿Eliminar este partido?"))return;
  let um=JSON.parse(localStorage.getItem("messi_matches")||"[]");
  um=um.filter(m=>m.id!==id);
  localStorage.setItem("messi_matches",JSON.stringify(um));
  document.getElementById("detOv").classList.remove("open");
  render();
}

function openAddMatch(){
  document.getElementById("detSheet").innerHTML=`
    <div class="handle"></div>
    <div class="sh2">Nuevo Partido</div>
    <div class="fw">
      <div class="row2">
        <div class="field"><label>LOCAL</label><input id="mhome" placeholder="Argentina"></div>
        <div class="field"><label>VISITANTE</label><input id="maway" placeholder="Brasil"></div>
      </div>
      <div class="row2">
        <div class="field"><label>RESULTADO</label><input id="mscore" placeholder="2-1"></div>
        <div class="field"><label>FECHA</label><input id="mdate" placeholder="15 Jun 2024"></div>
      </div>
      <div class="field"><label>COMPETENCIA</label><input id="mcomp" placeholder="Copa América"></div>
      <div class="field"><label>ESTADIO</label><input id="mstadium" placeholder="Monumental"></div>
      <div class="row2">
        <div class="field"><label>GOLES MESSI</label><input id="mgoals" type="number" placeholder="0" value="0"></div>
        <div class="field"><label>ASIST. MESSI</label><input id="massists" type="number" placeholder="0" value="0"></div>
      </div>
      <div class="field"><label>LINK YOUTUBE (opcional)</label><input id="myt" placeholder="https://youtube.com/watch?v=..."></div>
    </div>
    <button class="save-btn" onclick="saveMatch()">Guardar Partido</button>`;
  document.getElementById("detOv").classList.add("open");
}

function saveMatch(){
  const ytInput=document.getElementById("myt").value.trim();
  let ytId="";
  if(ytInput){
    const m=ytInput.match(/(?:v=|youtu\.be\/)([^&\s]+)/);
    if(m)ytId=m[1];
  }
  const match={
    id:"u"+Date.now(),
    home:document.getElementById("mhome").value.trim()||"Local",
    away:document.getElementById("maway").value.trim()||"Visitante",
    score:document.getElementById("mscore").value.trim()||"0-0",
    date:document.getElementById("mdate").value.trim()||"",
    competition:document.getElementById("mcomp").value.trim()||"",
    round:"",
    stadium:document.getElementById("mstadium").value.trim()||"",
    messiGoals:parseInt(document.getElementById("mgoals").value)||0,
    messiAssists:parseInt(document.getElementById("massists").value)||0,
    youtubeId:ytId,
    scorers:[],
    note:""
  };
  let um=JSON.parse(localStorage.getItem("messi_matches")||"[]");
  um.unshift(match);
  localStorage.setItem("messi_matches",JSON.stringify(um));
  document.getElementById("detOv").classList.remove("open");
  render();
}


function teamFlag(name){
  const flags={"Argentina":"🇦🇷","Uruguay":"🇺🇾","Venezuela":"🇻🇪","Ecuador":"🇪🇨",
    "Real Madrid":"⚪","Barcelona":"🔵🔴","Brasil":"🇧🇷","Colombia":"🇨🇴","Chile":"🇨🇱",
    "Bolivia":"🇧🇴","Paraguay":"🇵🇾","Peru":"🇵🇪","Inter Miami":"🌴"};
  return flags[name]||"⚽";
}
function openYT(id){window.open("https://www.youtube.com/watch?v="+id,"_blank");}
function bgc(e,id){if(e.target.id===id)document.getElementById(id).classList.remove("open")}
render();

</script>
