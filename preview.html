<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>html,body{background:#07090f}</style>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#07090f">
<title>Colección Messi</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="images/icon-192.png">
<link rel="icon" type="image/webp" href="images/icon-192.webp">
<link rel="shortcut icon" href="images/icon-192.png">
<link rel="apple-touch-icon" href="images/icon-180.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--s1:#0e1220;--s2:#151c30;--s3:#1c2440;--gold:#d4a017;--gold2:#f2c94c;--blue:#1a56db;--text:#e8eaf5;--sub:#6a7490;--r:14px;--safe:env(safe-area-inset-bottom,16px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
input,textarea,select{user-select:text;-webkit-user-select:text}
html,body{height:100%;overflow:hidden;background:var(--bg)}body::before{content:"";position:fixed;inset:0;background-image:repeating-linear-gradient(45deg,rgba(255,255,255,.012) 0px,rgba(255,255,255,.012) 1px,transparent 1px,transparent 8px);pointer-events:none;z-index:0}
body{color:var(--text);font-family:"Barlow Condensed",sans-serif;display:flex;flex-direction:column}
.hdr{flex-shrink:0;background:linear-gradient(180deg,rgba(7,9,15,1) 0%,rgba(7,9,15,.97) 70%,rgba(7,9,15,.85) 100%);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,160,23,.2);padding:10px 14px 0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo-row{display:flex;align-items:center;gap:8px}
.logo-img{width:44px;height:38px;object-fit:contain;flex-shrink:0}
.search-inline{display:flex;align-items:center;gap:6px;flex-shrink:0}
.search-toggle{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;line-height:1;opacity:.8;transition:opacity .2s;flex-shrink:0}
.search-toggle.active{opacity:1}
.search-expand{display:flex;align-items:center;gap:5px}
.search-input-inline{background:var(--s2);border:1.5px solid rgba(212,160,23,.25);border-radius:50px;padding:7px 14px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:13px;outline:none;width:140px;transition:border-color .2s,width .25s;-webkit-appearance:none}
.search-input-inline:focus{border-color:var(--gold)}
.search-input-inline::placeholder{color:rgba(212,160,23,.4)}
.search-clear{background:none;border:none;color:rgba(212,160,23,.5);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
/* PROGRESS */
.progress-wrap{margin:10px 10px 0;background:var(--s1);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,.06);position:relative;z-index:1}
.progress-title{font-family:"Bebas Neue",sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold2);margin-bottom:12px;display:flex;align-items:center;gap:8px}.progress-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(212,160,23,.3),transparent)}
.prog-row{margin-bottom:10px}
.prog-row-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.prog-club{font-size:12px;font-weight:700;color:var(--text)}
.prog-count{font-size:11px;font-weight:700;color:var(--sub)}
.prog-bar-bg{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.25,.46,.45,.94)}
.prog-total-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.06)}
.prog-donut-wrap{position:relative;width:70px;height:70px;flex-shrink:0}
.prog-donut-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.prog-donut-pct{font-family:"Bebas Neue",sans-serif;font-size:18px;color:var(--gold2);line-height:1}
.prog-donut-sub{font-size:8px;color:var(--sub);font-weight:700;letter-spacing:.3px}
.prog-total-text{flex:1}
.prog-total-num{font-family:"Bebas Neue",sans-serif;font-size:26px;color:var(--gold2);line-height:1}
.prog-total-lbl{font-size:11px;color:var(--sub);font-weight:600;margin-top:2px}
.logo-text{font-family:"Bebas Neue",sans-serif;font-size:23px;letter-spacing:3px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.logo-sub{font-size:10px;letter-spacing:.7px;-webkit-text-fill-color:var(--sub);margin-top:1px}
.chips-row{display:flex;gap:5px;padding:6px 0 0;overflow-x:auto;scrollbar-width:none}
.chips-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 9px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip.on{background:rgba(212,160,23,.18);border-color:var(--gold);color:var(--gold2);box-shadow:0 0 10px rgba(212,160,23,.2)}
.main-tabs{display:flex;gap:0;border-bottom:2px solid rgba(255,255,255,.04);margin-top:6px}
.mtab{flex:1;padding:9px 4px;font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-align:center;white-space:nowrap;letter-spacing:.2px}
.mtab.on{color:var(--gold2);border-bottom-color:var(--gold)}
.scroll{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px 2px}
.filter-btn{display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 0;width:100px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:50px;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.filter-btn.active{border-color:var(--gold);color:var(--gold2);background:rgba(212,160,23,.1);border-radius:50px}
.sort-btn{display:flex;align-items:center;justify-content:center;gap:4px;padding:7px 0;width:100px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:50px;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.season-hdr{font-family:"Bebas Neue",sans-serif;color:var(--gold2);padding:10px 12px 10px 12px;display:flex;align-items:center;gap:8px;margin-top:6px;border-top:1px solid rgba(212,160,23,.15)}.season-hdr::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(212,160,23,.3),transparent)}.season-label{font-size:22px;letter-spacing:2px;line-height:1}.season-year{font-size:17px;letter-spacing:1.5px;line-height:1}.season-hdr small{font-size:12px;font-weight:600;font-family:"Barlow Condensed",sans-serif;color:var(--sub)}
.season-hdr small{font-size:10px;font-weight:600;font-family:"Barlow Condensed",sans-serif;color:var(--sub)}
.grid-wrap{padding:0 10px;margin-bottom:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;padding-bottom:4px}
.pb-safe{height:calc(8px + var(--safe));flex-shrink:0}
.empty{text-align:center;padding:50px 20px;color:var(--sub);font-size:14px;line-height:1.8}
.card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .18s;animation:up .3s ease both;position:relative}
.card:active{transform:scale(.95)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-img{position:relative;background:var(--s2);height:130px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img img{max-width:100%;max-height:122px;width:auto;height:auto;object-fit:contain;display:block;-webkit-user-drag:none;pointer-events:none;will-change:auto}
.badge-cat{position:absolute;top:6px;left:6px;font-size:8px;font-weight:800;letter-spacing:.3px;padding:3px 8px;border-radius:6px;line-height:1.4}
.bc-orig{background:#1a56db;color:#fff;border:1px solid #4a7ff5}
.bc-orig-num{background:#b87a00;color:#fff;border:1px solid #f0a020}
.bc-china{background:#b01a1a;color:#fff;border:1px solid #e04040}
.bc-trucha{background:#3a3a50;color:#ddd;border:1px solid #5a5a70}


.card-info{padding:6px 9px 2px}
.card-club{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
.card-name{font-size:12px;font-weight:700;line-height:1.2;margin:1px 0}
.card-year{font-size:10px;color:var(--sub)}
.card-foot{display:flex;align-items:center;justify-content:space-between;padding:2px 9px 7px}
.card-num{font-family:"Bebas Neue",sans-serif;font-size:26px;color:rgba(255,255,255,.07);line-height:1}
.stars{font-size:10px}
.cat-card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:12px;overflow:hidden;cursor:pointer;position:relative;transition:transform .15s}
.cat-card:active{transform:scale(.96)}
.owned-chip{position:absolute;inset:0;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);border-radius:12px;z-index:2;pointer-events:none}.owned-check{position:absolute;top:7px;right:7px;width:22px;height:22px;background:#22c55e;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;z-index:3;color:#fff;font-weight:900;box-shadow:0 2px 6px rgba(34,197,94,.4)}
.cat-img{height:110px;background:var(--s2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.cat-img img{max-width:100%;max-height:110px;width:auto;height:auto;object-fit:contain;-webkit-user-drag:none;pointer-events:none}
.cat-info{padding:5px 8px 4px}
.cat-yr{font-size:9px;font-weight:700;color:var(--sub)}
.cat-name{font-size:11px;font-weight:700;line-height:1.2}
.add-cat-btn{width:100%;padding:9px;background:rgba(212,160,23,.12);border:none;border-top:1px solid rgba(212,160,23,.2);color:var(--gold2);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.8px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s}.add-cat-btn:active{background:rgba(212,160,23,.22)}
.cat-chips-row{display:flex;gap:5px;padding:0 10px 6px;overflow-x:auto;scrollbar-width:none}
.cat-chips-row::-webkit-scrollbar{display:none}
.cchip{flex-shrink:0;padding:5px 11px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.cchip.on{background:var(--blue);border-color:var(--blue);color:#fff}
.cchip.type-chip.on{background:var(--s3);border-color:rgba(255,255,255,.2);color:var(--text)}
.drawer-wrap{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.drawer-wrap.open{opacity:1;pointer-events:all}
.drawer-bg{position:absolute;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px)}
.drawer{position:relative;background:linear-gradient(180deg,#131828 0%,#0e1220 100%);border-radius:22px 22px 0 0;padding-bottom:calc(16px + var(--safe));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1);border-top:1px solid rgba(212,160,23,.2)}
.drawer-wrap.open .drawer{transform:translateY(0)}
.d-handle{width:36px;height:4px;background:rgba(212,160,23,.25);border-radius:2px;margin:14px auto 16px}
.d-title{font-family:"Bebas Neue",sans-serif;font-size:22px;letter-spacing:2px;padding:0 18px;margin-bottom:14px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.d-sec{padding:0 18px;margin-bottom:14px}
.d-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.7px;margin-bottom:7px}
.d-opts{display:flex;flex-direction:column;gap:6px}.dopt-count{font-size:12px;color:var(--sub);font-weight:600;opacity:.7}
.dopt{padding:12px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.08);background:var(--s2);color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;-webkit-appearance:none;touch-action:manipulation}
.dopt.on{background:rgba(212,160,23,.15);border-color:var(--gold);color:var(--gold2)}.dopt.on .dopt-count{color:var(--gold2);opacity:.7}
.d-apply{width:calc(100% - 36px);margin:4px 18px 0;padding:14px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:13px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:700;cursor:pointer}
.nav{flex-shrink:0;background:rgba(7,9,15,.97);backdrop-filter:blur(20px);border-top:1px solid rgba(212,160,23,.25);display:flex;justify-content:space-around;padding:7px 0 calc(7px + var(--safe))}
.nav-i{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:700;color:var(--sub);cursor:pointer;padding:3px 14px;transition:color .2s}
.nav-i .ico{font-size:19px}
.nav-i.on{color:var(--gold2)}
.overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{width:100%;background:var(--s1);border-radius:22px 22px 0 0;max-height:93dvh;overflow-y:auto;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,.72,0,1)}
.overlay.open .sheet{transform:translateY(0)}
.sheet::-webkit-scrollbar{display:none}
.handle{width:60px;height:5px;background:rgba(212,160,23,.4);border-radius:3px;margin:13px auto 15px;cursor:grab;touch-action:none}
.sh2{font-family:"Bebas Neue",sans-serif;font-size:24px;letter-spacing:2px;padding:0 15px;margin-bottom:12px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.fw{padding:0 15px}
.field{margin-bottom:10px}
.field label{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;display:block;margin-bottom:4px}
.field select,.field input{width:100%;background:var(--s2);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;outline:none;-webkit-appearance:none}
.row2{display:flex;gap:7px}.row2 .field{flex:1}
.save-btn{width:calc(100% - 30px);margin:10px 15px calc(10px + var(--safe));padding:14px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:12px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.det-hero{margin:0 13px 12px;border-radius:14px;background:var(--s2);height:200px;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(255,255,255,.06)}
.det-hero img{max-width:100%;max-height:190px;width:auto;height:auto;object-fit:contain}
.det-meta{padding:0 14px}
.det-club{font-size:10px;font-weight:800;letter-spacing:1.5px;color:var(--gold);margin-bottom:1px}
.det-name{font-family:"Bebas Neue",sans-serif;font-size:23px;line-height:1.1;margin-bottom:4px}
.det-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:11px;align-items:center}
.tag{font-size:9px;font-weight:800;letter-spacing:.3px;padding:3px 7px;border-radius:6px;background:rgba(255,255,255,.08);color:var(--sub)}
.tag.g{background:rgba(212,160,23,.2);color:var(--gold2)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 14px 11px}
.stat-box{background:var(--s2);border-radius:10px;padding:9px 11px;border:1px solid rgba(255,255,255,.06);border-left:2px solid rgba(212,160,23,.5)}
.stat-val{font-family:"Bebas Neue",sans-serif;font-size:26px;color:var(--gold2);line-height:1;transition:all .3s}
.stat-lbl{font-size:9px;font-weight:800;color:var(--sub);letter-spacing:.4px;margin-top:1px}
.titles-sec{margin:0 14px 13px}
.titles-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;margin-bottom:5px}
.titles-list{display:flex;flex-wrap:wrap;gap:5px}
.title-chip{background:linear-gradient(135deg,rgba(212,160,23,.2),rgba(242,201,76,.1));border:1px solid rgba(212,160,23,.25);color:var(--gold2);font-size:10px;font-weight:700;padding:4px 10px;border-radius:18px}
.no-titles{font-size:12px;color:var(--sub);font-style:italic}
.det-acts{display:flex;gap:8px;padding:0 14px;margin-bottom:calc(14px + var(--safe))}
.btn-del{flex:1;padding:12px;border:1.5px solid rgba(220,53,69,.3);border-radius:12px;background:rgba(220,53,69,.08);color:#ff7070;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-cls{flex:1;padding:12px;background:var(--s2);border:none;border-radius:12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.btn-add{flex:2;padding:12px;background:rgba(212,160,23,.15);border:1.5px solid rgba(212,160,23,.3);border-radius:12px;color:var(--gold2);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s}.btn-add:active{background:rgba(212,160,23,.25)}
.in-sel{width:100%;background:var(--s2);border:1.5px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;outline:none;-webkit-appearance:none;margin-bottom:7px}
.in-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;display:block;margin-bottom:4px}

/* MATCHES */
.matches-wrap{padding:10px}
.match-add-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),#0a3fa0);border:none;border-radius:13px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.match-card{background:linear-gradient(160deg,#131828 0%,#0e1220 60%,#0a0f1a 100%);border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:transform .15s;position:relative;z-index:1}
.match-card:active{transform:scale(.98)}
.match-header{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.match-teams{flex:1;min-width:0}
.match-comp{font-size:9px;font-weight:800;letter-spacing:.8px;color:var(--gold);text-transform:uppercase;margin-bottom:5px}
.match-vs{font-family:"Bebas Neue",sans-serif;font-size:20px;letter-spacing:.5px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.match-info{font-size:10px;color:var(--sub);margin-top:4px}
.match-score-box{background:linear-gradient(135deg,rgba(212,160,23,.15),rgba(212,160,23,.05));border:1px solid rgba(212,160,23,.2);border-radius:12px;padding:8px 14px;text-align:center;flex-shrink:0}
.match-score{font-family:"Bebas Neue",sans-serif;font-size:28px;color:var(--gold2);line-height:1;letter-spacing:2px}
.match-date{font-size:9px;color:var(--sub);font-weight:700;margin-top:2px;white-space:nowrap}
.match-footer{background:rgba(0,0,0,.2);border-top:1px solid rgba(255,255,255,.05);padding:8px 14px;display:flex;align-items:center;gap:10px}
.match-messi-stat{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--text)}
.match-messi-ico{font-size:13px}
.match-play-btn{margin-left:auto;background:rgba(255,0,0,.15);border:1px solid rgba(255,0,0,.25);color:#ff4444;border-radius:8px;padding:5px 10px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px}
/* match detail */
.yt-embed{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;margin:0 0 12px}
.match-note{font-size:13px;color:var(--sub);line-height:1.6;padding:0 14px;margin-bottom:12px;font-style:italic}
.scorers-list{padding:0 14px;margin-bottom:12px}
.scorers-lbl{font-size:10px;font-weight:800;color:var(--sub);letter-spacing:.6px;margin-bottom:5px}
.scorer-chip{display:inline-flex;align-items:center;gap:4px;background:var(--s2);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;margin:3px 3px 0 0}
.match-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 14px 12px}

/* ── CARD BOUNCE ── */
.card:active{transform:scale(.97)!important;transition:transform .1s ease}
.cat-card:active{transform:scale(.97)!important;transition:transform .1s ease}

/* ── TAB FADE ── */
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
#inner{animation:slideIn .22s cubic-bezier(.25,.46,.45,.94)}

/* ── LONG PRESS MENU ── */
.ctx-menu{position:fixed;z-index:500;background:rgba(14,18,32,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);border-radius:16px;overflow:hidden;min-width:190px;box-shadow:0 12px 40px rgba(0,0,0,.7);animation:fadeIn .15s ease}
.ctx-item{padding:14px 18px;font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s;letter-spacing:.3px}
.ctx-item:active{background:var(--s2)}
.ctx-item+.ctx-item{border-top:1px solid rgba(255,255,255,.06)}
.ctx-item.danger{color:#ff7070}
.ctx-backdrop{position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}


/* ── LONG PRESS SHEET ── */
.ctx-backdrop{position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.5);backdrop-filter:blur(8px)}
.ctx-sheet{position:fixed;bottom:0;left:0;right:0;z-index:500;background:linear-gradient(180deg,#131828 0%,#0e1220 100%);border-radius:22px 22px 0 0;border-top:1px solid rgba(212,160,23,.2);padding-bottom:calc(16px + var(--safe));animation:slideUp .3s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ctx-handle{width:36px;height:4px;background:rgba(212,160,23,.25);border-radius:2px;margin:14px auto 10px}
.ctx-title{font-size:11px;font-weight:800;color:var(--sub);letter-spacing:.8px;text-align:center;padding:0 18px 12px;text-transform:uppercase}
.ctx-item{padding:14px 20px;font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s;border-top:1px solid rgba(255,255,255,.05)}
.ctx-item:active{background:var(--s2)}
.ctx-item.danger{color:#ff7070}
.ctx-cancel{width:calc(100% - 32px);margin:10px 16px 0;padding:14px;background:var(--s2);border:none;border-radius:13px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:700;cursor:pointer}

@keyframes fadeOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.9)}}
.card.removing{animation:fadeOut .25s ease forwards}

/* ── EXPORT/IMPORT ── */
.backup-wrap{margin:10px 10px 0;padding:16px;background:linear-gradient(160deg,#131828 0%,#0e1220 100%);border-radius:14px;border:1px solid rgba(255,255,255,.07)}
.backup-title{font-family:"Bebas Neue",sans-serif;font-size:15px;letter-spacing:1.5px;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.backup-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),transparent)}
.backup-btns{display:flex;gap:8px}
.btn-export{flex:1;padding:12px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .2s}
.btn-export:active{border-color:var(--gold);background:rgba(212,160,23,.08);color:var(--gold2)}
.btn-import{flex:1;padding:12px;background:var(--s2);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:border-color .2s}
.btn-import:active{border-color:var(--blue);background:rgba(26,86,219,.1);color:#7bb3ff}

/* ── FILTER CHIPS ROW ── */
.filter-chips-row{display:flex;gap:6px;padding:0 10px 2px;overflow-x:auto;scrollbar-width:none}
.filter-chips-row::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;padding:5px 12px;border-radius:16px;border:1.5px solid rgba(255,255,255,.08);background:transparent;color:var(--sub);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.fchip.on{background:rgba(212,160,23,.15);border-color:var(--gold);color:var(--gold2)}
.fchip.club-barca.on{background:rgba(200,16,46,.15);border-color:#c8102e;color:#ff6b7a}
.fchip.club-psg.on{background:rgba(0,47,94,.4);border-color:#4a90d9;color:#7bb3ff}
.fchip.club-miami.on{background:rgba(240,168,192,.1);border-color:#f0a8c0;color:#f0a8c0}
.fchip.club-arg.on{background:rgba(116,179,232,.1);border-color:#74b3e8;color:#74b3e8}
.fchip-sep{width:1px;background:rgba(255,255,255,.08);flex-shrink:0;margin:4px 0}

/* ── CLUB STAT CARDS ── */
.club-cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.club-card-stat{background:var(--s2);border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:4px;border:1px solid rgba(255,255,255,.06)}
.club-card-logo{height:36px;display:flex;align-items:center;justify-content:center}
.club-card-pct{font-family:"Bebas Neue",sans-serif;font-size:26px;line-height:1}
.club-card-count{font-size:10px;font-weight:700;color:var(--sub)}
.club-card-bar{width:100%;height:4px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:4px;overflow:hidden}.club-card-bar div{transition:width .8s cubic-bezier(.25,.46,.45,.94)}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s ease;pointer-events:all}
#splash.hide{opacity:0;pointer-events:none}
#splash-logo{width:90px;height:90px;object-fit:contain;animation:splashPop .6s cubic-bezier(.36,.07,.19,.97)}
#splash-title{font-family:"Bebas Neue",sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(120deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@keyframes splashPop{0%{transform:scale(.7);opacity:0}60%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ── GRID RESPONSIVE ── */
@media(min-width:600px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.grid{grid-template-columns:repeat(4,1fr)}}

/* ── SCROLL FADE TOP ── */


/* ── CAT NUM BADGE ── */

/* ── DESKTOP LAYOUT ── */

/* ── CUSTOM SCROLLBAR ── */
.scroll-bar{position:fixed;right:0px;width:12px;border-radius:6px;background:rgba(212,160,23,.35);pointer-events:all;z-index:200;cursor:grab;opacity:0;transition:opacity .3s,background .2s;top:0}

    const cA=CLUB_ORDER.indexOf(a.club), cB=CLUB_ORDER.indexOf(b.club);
    const clubDiff=(cA===-1?99:cA)-(cB===-1?99:cB);
    if(clubDiff!==0) return clubDiff;
    // same club: type order
    const tA=TYPE_ORDER[a.type]??9, tB=TYPE_ORDER[b.type]??9;
    return tA-tB;
  });
}

function groupBy(arr){
  const m={};
  arr.forEach(x=>{const s=x.season||String(x.year);if(!m[s])m[s]=[];m[s].push(x);});
  return m;
}
function sKeys(m,asc){return Object.keys(m).sort((a,b)=>asc?a.localeCompare(b):b.localeCompare(a));}

  inner.innerHTML=`<div class="progress-wrap">

      <div class="prog-donut-wrap">
        ${donutSVG}

          <div class="prog-donut-pct" id="progPct">0%</div>
          <div class="prog-donut-sub">TOTAL</div>
        </div>
      </div>
      <div class="prog-total-text">
        <div class="prog-total-num"><span id="progOwned">0</span><span style="font-size:14px;color:var(--sub)">/${totalCat}</span></div>
        <div class="prog-total-lbl">camisetas en tu colección</div>
      </div>
    </div>
  </div>
  <div class="progress-wrap" style="margin-top:10px">
    <div class="progress-title">👕 Por Categoría</div>
    ${catBreak}
  </div>
  ${matchStatsHTML}
  <div class="backup-wrap">
    <div class="backup-title">COPIA DE SEGURIDAD</div>
    <div class="backup-btns">
      <button class="btn-export" onclick="exportData()">📤 Exportar</button>
      <button class="btn-import" onclick="document.getElementById('importFile').click()">📥 Importar</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="pb-safe"></div>`;
  // Animate everything in progress
  requestAnimationFrame(()=>{
    const dur=900, t0=performance.now();
    // Counter animation function
    function animCount(el, target, suffix){
      if(!el)return;
      function step(now){
        const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
        el.textContent=Math.round(e*target)+(suffix||'');
        if(p<1)requestAnimationFrame(step);
      }

    }

        el.textContent=Math.round(e*target)+'%';
        if(p<1)requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    });
    // Animate donut arc
    const arc=document.querySelector('.donut-arc');
    if(arc){
      arc.style.animation='none';
      void arc.offsetWidth;
      arc.style.animation='donutFill .9s cubic-bezier(.25,.46,.45,.94) forwards';
      arc.style.setProperty('--filled', (2*Math.PI*28*(pct/100))+'px');
    }
  });
}

// ── SWIPE TO CLOSE - only from handle ──
function addSwipeToClose(sheetEl, overlayId){
  let startY=0, currentY=0, isDragging=false;
  function onStart(y,e){
    // activate from anywhere in top 280px of sheet
    const sheetTop=sheetEl.getBoundingClientRect().top;
    if(y-sheetTop>280)return;
    if(e.target.closest('button,input,select,a'))return;
    startY=y;isDragging=true;sheetEl.style.transition='none';
  }
  function onMove(y,e){
    if(!isDragging)return;
    currentY=y;
    const diff=currentY-startY;
    if(diff>0){
      if(e&&e.cancelable)e.preventDefault();
      sheetEl.style.transform=`translateY(${diff}px)`;
    }
  }
  function onEnd(){
    if(!isDragging)return;
    isDragging=false;
    sheetEl.style.transition='transform .32s cubic-bezier(.32,.72,0,1)';
    const diff=currentY-startY;
    if(diff>60){document.getElementById(overlayId).classList.remove('open');sheetEl.style.transform='';}
    else sheetEl.style.transform='';
    startY=0;currentY=0;
  }
  sheetEl.addEventListener('touchstart',e=>onStart(e.touches[0].clientY,e),{passive:true});
  sheetEl.addEventListener('touchmove',e=>onMove(e.touches[0].clientY,e),{passive:false});
  sheetEl.addEventListener('touchend',onEnd,{passive:true});
  sheetEl.addEventListener('mousedown',e=>onStart(e.clientY,e));
  window.addEventListener('mousemove',e=>{if(isDragging)onMove(e.clientY,e);});
  window.addEventListener('mouseup',()=>{if(isDragging)onEnd();});
}


// ── LONG PRESS MENU ──
let lpTimer=null, lpActive=false;

// ── LONG PRESS MENU ──
function initLongPress(el, id, type){
  function start(e){
    lpActive=false;
    clearTimeout(lpTimer);
    const touch=e.touches?e.touches[0]:e;
    const x=touch.clientX, y=touch.clientY;
    lpTimer=setTimeout(()=>{
      lpActive=true;
      showCtxMenu(x, y, id, type);
    },600);
  }
  function cancel(){ clearTimeout(lpTimer); }
  // Touch
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel,{passive:true});
  el.addEventListener('touchmove',cancel,{passive:true});
  // Mouse - NO mouseleave so moving slightly doesn't cancel
  el.addEventListener('mousedown',e=>{ if(e.button!==0)return; start(e); });
  el.addEventListener('mouseup',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
  el.addEventListener('click',()=>{ setTimeout(()=>{lpActive=false;},50); });
}
function showCtxMenu(x, y, id, type){
  closeCtxMenu();
  const backdrop=document.createElement('div');
  backdrop.className='ctx-backdrop';
  backdrop.onclick=closeCtxMenu;

  const sheet=document.createElement('div');
  sheet.className='ctx-sheet';
  sheet.id='ctxMenu';

  let items='';
  if(type==='col'||type==='owned'){
    items=`<div class="ctx-item danger" onclick="ctxDel('${id}')">🗑️ Eliminar de mi colección</div>`;
  } else {
    items=`<div class="ctx-item" onclick="ctxAdd('${id}')">➕ Agregar a mi colección</div>`;
  }

  sheet.innerHTML=`
    <div class="ctx-handle"></div>
    ${items}
    <button class="ctx-cancel" onclick="closeCtxMenu()">Cancelar</button>`;

  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);
  // Add swipe to close
  let startY=0, isDragging=false;
  sheet.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;isDragging=true;sheet.style.transition='none';},{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(!isDragging)return;
    const diff=e.touches[0].clientY-startY;
    if(diff>0)sheet.style.transform=`translateY(${diff}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    isDragging=false;
    sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';
    const diff=e.changedTouches[0].clientY-startY;
    if(diff>60){closeCtxMenu();}
    else sheet.style.transform='';
  },{passive:true});
  sheet.addEventListener('mousedown',e=>{startY=e.clientY;isDragging=true;sheet.style.transition='none';});
  window.addEventListener('mousemove',e=>{if(isDragging){const d=e.clientY-startY;if(d>0)sheet.style.transform=`translateY(${d}px)`;}});
  window.addEventListener('mouseup',e=>{if(isDragging){isDragging=false;sheet.style.transition='transform .3s cubic-bezier(.32,.72,0,1)';if(e.clientY-startY>60)closeCtxMenu();else sheet.style.transform='';}});
}

function closeCtxMenu(){
  document.getElementById('ctxMenu')?.remove();
  document.querySelector('.ctx-backdrop')?.remove();
}
function ctxFav(id){
  closeCtxMenu();
  const j=col.find(x=>x.id===id);
  if(j){j.fav=!j.fav;save();render();}
}
function ctxDel(id){
  closeCtxMenu();
  if(!confirm('¿Eliminar esta camiseta?'))return;
  const card=document.querySelector(`.card[data-id="${id}"]`);
  if(card){
    card.classList.add("removing");
    setTimeout(()=>{col=col.filter(j=>j.id!==id);save();render();},250);
  } else {
    col=col.filter(j=>j.id!==id);save();render();
  }
}
function ctxAdd(cid){
  closeCtxMenu();
  openCatDet(cid);
}

function initScrollIndicator(){}


function editCond(id){
  const j=col.find(x=>x.id===id);if(!j)return;
  const opts=[5,4,3,2,1].map(n=>`
    <div onclick="saveCond('${id}',${n})" style="display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);${j.cond===n?'background:rgba(212,160,23,.1)':''}">
      <span style="font-size:14px;font-weight:700">${Array.from({length:5},(_,i)=>i<n?'⭐':'☆').join('')}</span>
      ${j.cond===n?'<span style="color:var(--gold2);font-size:12px;font-weight:700">✓ Actual</span>':''}
    </div>`).join('');
  document.getElementById('detSheet').innerHTML=`
    <div class="handle"></div>
    <div class="sh2">Condición</div>
    ${opts}
    <div style="padding:14px"><button class="btn-cls" style="width:100%" onclick="document.getElementById('detOv').classList.remove('open')">Cancelar</button></div>`;
  addSwipeToClose(document.getElementById('detSheet'),'detOv');
}
function saveCond(id,n){
  const j=col.find(x=>x.id===id);
  if(j){j.cond=n;save();}
  document.getElementById('detOv').classList.remove('open');
  render();
}


function delFromCat(cid){
  if(!confirm("¿Eliminar esta camiseta de tu colección?"))return;
  document.getElementById("detOv").classList.remove("open");
  col=col.filter(j=>j.catalogId!==cid);
  save();render();
}


function exportData(){
  const data={col,matches:JSON.parse(localStorage.getItem("messi_matches")||"[]")};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='messi-coleccion.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importData(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.col){col=data.col;save();}
      if(data.matches)localStorage.setItem("messi_matches",JSON.stringify(data.matches));
      document.getElementById("scroll").scrollTop=0;
      render();
      alert("✅ Colección restaurada correctamente");
    }catch(err){
      alert("❌ Archivo inválido");
    }
  };
  reader.readAsText(file);
  e.target.value='';
}


// ── DRAGGABLE SCROLLBAR ──
function initScrollBar(){
  const scroll=document.getElementById('scroll');
  let bar=document.getElementById('scrollBar');
  if(!bar){
    bar=document.createElement('div');
    bar.id='scrollBar';
    bar.className='scroll-bar';
    document.body.appendChild(bar);
  }
  let hideTimer, isDragging=false, startY=0, startScrollTop=0;

  function updateBar(){
    const {scrollTop,scrollHeight,clientHeight}=scroll;
    if(scrollHeight<=clientHeight+10){bar.classList.remove('visible');return;}
    const rect=scroll.getBoundingClientRect();
    const nav=document.querySelector('.nav');
    const navRect=nav?nav.getBoundingClientRect():null;
    const navTop=navRect?navRect.top:window.innerHeight;
    // Track goes from rect.top+4 to navTop-4
    const trackStart=rect.top+4;
    const trackEnd=navTop-4;
    const trackH=trackEnd-trackStart;
    const barH=Math.max(44,Math.min(trackH*(clientHeight/scrollHeight),trackH));
    const scrollable=scrollHeight-clientHeight;
    const pct=scrollable>0?Math.min(scrollTop/scrollable,1):0;
    const barTop=trackStart+(trackH-barH)*pct;
    bar.style.height=barH+'px';
    bar.style.top=barTop+'px';
    bar.classList.add('visible');
    clearTimeout(hideTimer);
    if(!isDragging)hideTimer=setTimeout(()=>bar.classList.remove('visible'),1500);
  }

  scroll.addEventListener('scroll',updateBar,{passive:true});

  function onDragStart(clientY){
    isDragging=true;
    startY=clientY;
    startScrollTop=scroll.scrollTop;
    bar.classList.add('visible');
    bar.style.transition='none';
  }
  function onDragMove(clientY){
    if(!isDragging)return;
    const {scrollHeight,clientHeight}=scroll;
    const rect=scroll.getBoundingClientRect();
    const ratio=(scrollHeight-clientHeight)/(rect.height-parseInt(bar.style.height||'44'));
    scroll.scrollTop=startScrollTop+(clientY-startY)*ratio;
    updateBar();
    // Show season indicator
    const ind=document.getElementById('seasonIndicator');
    if(ind){
      const headers=[...document.querySelectorAll('.season-hdr')];
      const scrollMid=scroll.getBoundingClientRect().top+scroll.clientHeight*0.3;
      let closest=null;
      headers.forEach(h=>{
        const hTop=h.getBoundingClientRect().top;
        if(hTop<=scrollMid)closest=h;
      });
      if(closest){
        const yearEl=closest.querySelector('.season-year');
        ind.textContent=yearEl?yearEl.textContent.trim():closest.textContent.trim().split('\n')[0].trim();
        // Position at the middle of the scrollbar
        const barRect=bar.getBoundingClientRect();
        const nav2=document.querySelector('.nav');
        const navTop2=nav2?nav2.getBoundingClientRect().top:window.innerHeight;
        const indTop=Math.max(60,Math.min(barRect.top+barRect.height/2-20,navTop2-50));
        ind.style.top=indTop+'px';
        ind.classList.add('visible');
      }
    }
  }
  function onDragEnd(){
    isDragging=false;
    bar.style.transition='opacity .3s,width .2s,right .2s';
    hideTimer=setTimeout(()=>bar.classList.remove('visible'),1500);
    const ind=document.getElementById('seasonIndicator');
    if(ind)setTimeout(()=>ind.classList.remove('visible'),300);
  }

  bar.addEventListener('touchstart',e=>{onDragStart(e.touches[0].clientY);e.preventDefault();},{passive:false});
  bar.addEventListener('touchmove',e=>{onDragMove(e.touches[0].clientY);e.preventDefault();},{passive:false});
  bar.addEventListener('touchend',onDragEnd,{passive:true});
  bar.addEventListener('mousedown',e=>{onDragStart(e.clientY);e.preventDefault();});
  window.addEventListener('mousemove',e=>{if(isDragging)onDragMove(e.clientY);});
  window.addEventListener('mouseup',()=>{if(isDragging)onDragEnd();});

  updateBar();
}
